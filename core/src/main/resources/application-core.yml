import:
  job:
    lease: ${IMPORT_JOB_LEASE:PT5M}
    poll-interval: ${IMPORT_JOB_POLL_INTERVAL:PT1S}
    slots-per-instance: ${IMPORT_JOB_SLOTS_PER_INSTANCE:4}
    max-attempts: ${IMPORT_JOB_MAX_ATTEMPTS:5}
    ai-concurrency: ${IMPORT_JOB_AI_CONCURRENCY:10}
    ai-batch-size: ${IMPORT_JOB_AI_BATCH_SIZE:50}

view-count:
  dedup-ttl: ${VIEW_COUNT_DEDUP_TTL:PT24H}
  flush-interval: ${VIEW_COUNT_FLUSH_INTERVAL:PT10S}
