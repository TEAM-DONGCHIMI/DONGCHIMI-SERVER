services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dongchimi-postgres
    environment:
      POSTGRES_DB: dongchimi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dongchimi-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dongchimi-redis
    ports:
      - "6379:6379"
    volumes:
      - dongchimi-redis-data:/data

volumes:
  dongchimi-postgres-data:
  dongchimi-redis-data: