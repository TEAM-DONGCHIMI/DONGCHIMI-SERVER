services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: dongchimi-postgres
    environment:
      POSTGRES_DB: dongchimi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dongchimi-postgres-data:/var/lib/postgresql/data

volumes:
  dongchimi-postgres-data: