services:
  app:
    image: ${IMAGE_REPO}/dongchimi:${IMAGE_TAG:-latest}   # CI가 Docker Hub에 push한 이미지, 태그는 .env에서 주입 (롤백 시 이전 SHA로 변경)
    env_file:
      - path: .env
        required: false # 서버에만 존재, git 미포함
    environment:
      # Vertex AI(ADC) 인증용 서비스 계정 키 경로 — CI가 배포 때 ./secrets/gcp-sa.json에 파일화한 것을 마운트한다(volumes 참고)
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      # 메모리/GC 튜닝 — 힙 640m + 비힙 상한(Metaspace/CodeCache/Direct)으로 RSS를 mem_limit 안에 고정
      # 값 조정은 이미지 리빌드 없이 여기서만. 상세 근거는 docs/conventions 또는 튜닝 노트 참고
      JAVA_OPTS: >-
        -Xms640m -Xmx640m
        -XX:MaxMetaspaceSize=224m -XX:ReservedCodeCacheSize=96m -XX:MaxDirectMemorySize=64m
        -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:+UseContainerSupport
        -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/dumps/ -XX:+ExitOnOutOfMemoryError
        -Xlog:gc*:file=/app/logs/gc.log:time,uptime,level,tags:filecount=5,filesize=10m
    expose:
      - "8080"                                            # 내부 네트워크 전용, 호스트 미공개
    healthcheck:                                          # DB가 아닌 app 자체 헬스체크 (actuator)
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s                                   # Flyway 마이그레이션 포함 기동 시간 여유
    restart: unless-stopped
    mem_limit: 1150m                                      # 총 예산: app 1150 + redis 350 + caddy 96 + OS ~350 ≈ 1946/2048 (여유 ~100)
    memswap_limit: 1150m                                  # = mem_limit → 스왑 차단 (스왑으로 밀려 지연 폭증 방지)
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./secrets/gcp-sa.json:/run/secrets/gcp-sa.json:ro # Vertex 서비스 계정 키 (서버에만 존재, CI가 배포 때 생성). up 전에 파일이 있어야 함
      - app-dumps:/app/dumps                              # OOM 힙 덤프 영속 (재배포에도 보존, 사후 분석용)
      - app-logs:/app/logs                                # GC 로그(gc.log.*) 영속

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 300mb --maxmemory-policy volatile-lru  # 스왑 차단과 세트(상한 없으면 OOM Kill). TTL 있는 키만 LRU로 정리 → 쓰기 실패 없이 self-healing
    expose:
      - "6379"                                            # 내부 네트워크 전용, 호스트 미공개
    mem_limit: 350m                                       # 컨테이너 메모리 상한 (maxmemory + RSS 오버헤드 여유)
    memswap_limit: 350m                                   # mem_limit과 동일 → memory.swap.max=0, redis가 스왑으로 밀리지 않음
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data                                  # 인증서/ACME 계정 상태 영속 (필수)
      - caddy-config:/config
    depends_on:
      - app
    restart: unless-stopped
    mem_limit: 96m                                        # Go 바이너리, 실사용 30~60m
    memswap_limit: 96m                                    # = mem_limit → 스왑 차단

volumes:
  caddy-data:
  caddy-config:
  redis-data:
  app-dumps:
  app-logs: