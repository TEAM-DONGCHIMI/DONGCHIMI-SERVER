name: deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (테스트 제외 - 컴파일/ktlint 게이트)
        run: ./gradlew build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dongchimi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dongchimi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        env:
          GCP_SA_KEY_BASE64: ${{ secrets.GCP_SA_KEY_BASE64 }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GCP_SA_KEY_BASE64            # Vertex 서비스 계정 키(base64)를 원격 스크립트로 전달
          script: |
            cd /opt/dongchimi/docker/prod
            # 서비스 계정 키를 EC2에서 파일화 (compose가 마운트하므로 up 전에 존재해야 함)
            mkdir -p secrets
            echo "$GCP_SA_KEY_BASE64" | base64 -d > secrets/gcp-sa.json
            chmod 600 secrets/gcp-sa.json
            docker compose pull
            docker compose up -d
