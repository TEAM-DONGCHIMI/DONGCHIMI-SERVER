oauth:
  kakao:
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    connect-timeout: ${KAKAO_CONNECT_TIMEOUT:2s}
    read-timeout: ${KAKAO_READ_TIMEOUT:5s}

monitoring:
  discord:
    enabled: ${DISCORD_ALERT_ENABLED:false}
    webhook-url: ${DISCORD_WEBHOOK_URL:}
    connect-timeout: ${DISCORD_CONNECT_TIMEOUT:2s}
    read-timeout: ${DISCORD_READ_TIMEOUT:3s}
  sentry:
    enabled: ${SENTRY_ENABLED:false}
    dsn: ${SENTRY_DSN:}
    environment: ${SENTRY_ENVIRONMENT:local}
    traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.0}

qr:
  base-url: ${FLYER_BASE_URL:https://app.dongchiimi.com}
  size: ${QR_SIZE:183}
  margin: ${QR_MARGIN:1}

import:
  ai:
    provider: ${IMPORT_AI_PROVIDER:mock}
  mock:
    latency: ${IMPORT_MOCK_LATENCY:PT0.3S}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  connect-timeout: ${GEMINI_CONNECT_TIMEOUT:3s}
  read-timeout: ${GEMINI_READ_TIMEOUT:20s}
  max-retries: ${GEMINI_MAX_RETRIES:2}
  thinking-budget: ${GEMINI_THINKING_BUDGET:0}
